<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HockeyStats</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>HockeyStats</h1>
    <p>Top players this season</p>

    <table>
        <thead>
            <tr>
                <th>Player</th>
                <th>Team</th>
                <th>Goals</th>
                <th>Assists</th>
                <th>Points</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Alice Karlsson</td>
                <td>Sundsvall IK</td>
                <td>12</td>
                <td>15</td>
                <td>25</td>
            </tr>
            <tr>
                <td>Bob Eriksson</td>
                <td>Timra IK</td>
                <td>9</td>
                <td>18</td>
                <td>27</td>
            </tr>
            <tr>
                <td>Clara Nilsson</td>
                <td>Sundsvall IK</td>
                <td>14</td>
                <td>10</td>
                <td>22</td>
            </tr>
        </tbody>
    </table>

    <button onclick="sortTable()">Sort by Points</button>

    <div id="player-modal" class="modal hidden">
        <div class="modal-backdrop"></div>
        <div class="modal-card">
            <button class="modal-close" aria-label="Close">&times;</button>
            <header class="modal-header">
                <h2 id="modal-player-name"></h2>
                <p id="modal-player-team"></p>
            </header>
            <ul class="modal-stats">
                <li>Goals: <span id="modal-player-goals"></span></li>
                <li>Assists: <span id="modal-player-assists"></span></li>
                <li>Points: <span id="modal-player-points"></span></li>
            </ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
